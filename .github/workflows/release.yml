name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Run tests
        run: dotnet test tests/EmailBackup.Core.Tests/EmailBackup.Core.Tests.csproj -c Release

      - name: Build portable executables
        shell: pwsh
        run: ./scripts/build-release.ps1 -Configuration Release

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          generate_release_notes: true
