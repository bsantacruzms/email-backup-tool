name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore EmailBackup.sln

      - name: Build
        run: dotnet build EmailBackup.sln -c Release --no-restore

      - name: Test
        run: dotnet test tests/EmailBackup.Core.Tests/EmailBackup.Core.Tests.csproj -c Release --no-build
